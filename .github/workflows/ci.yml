name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: python -m ruff check src tests scripts
      - name: Run tests
        run: python -m pytest -q
      - name: Security scan
        run: python -m bandit -q -r src || true
      - name: Dependency audit
        run: python -m pip_audit || true
      - name: Docker build
        run: docker build -t tradenodex-aat:ci .
