services:
  tradenodex-aat-api:
    build: .
    container_name: tradenodex-aat-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  tradenodex-aat-worker:
    build: .
    container_name: tradenodex-aat-worker
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "tradenodex_aat.worker"]
    depends_on:
      tradenodex-aat-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
