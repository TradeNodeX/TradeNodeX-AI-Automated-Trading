<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TradeNodeX AI Automated Trading</title>
  <style>
    :root{color-scheme:dark;--bg:#0a0a0a;--panel:#141414;--panel2:#121212;--field:#080808;--border:#1f1f1f;--border2:#262626;--text:#fff;--data:#ccc;--muted:#888;font-family:Inter,ui-sans-serif,system-ui,sans-serif}*{box-sizing:border-box}html,body{min-height:100%;margin:0;background:var(--bg);color:var(--text)}body{font-size:14px}.root{min-height:100vh;display:flex;flex-direction:column;text-transform:uppercase}.top{min-height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:24px;padding:0 24px}.brand{font-size:18px;font-weight:900;letter-spacing:-.03em}.status{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.chip,.stat{border:1px solid var(--border);background:var(--panel);padding:7px 12px;min-height:28px}.chip{font-size:10px;font-weight:900;letter-spacing:.16em}.stat{min-width:112px;border-top:0;border-bottom:0}.label{display:block;color:var(--muted);font-size:10px;letter-spacing:.18em;margin-bottom:5px}.value{font-size:13px;font-weight:900}.token{min-width:240px;background:var(--field);border:1px solid var(--border);color:var(--text);padding:8px 10px}.metrics{margin:16px 18px 18px;border:1px solid var(--border);background:var(--panel);padding:28px 14px}.metric-grid{display:grid;grid-template-columns:repeat(8,1fr);border-left:1px solid var(--border)}.metric{min-height:82px;background:var(--bg);padding:12px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between}.metric-top{display:flex;justify-content:space-between;color:var(--muted);font-size:9px;letter-spacing:.18em}.metric-num{font-size:20px;font-weight:900;letter-spacing:-.05em}.metric-note{color:var(--muted);font-size:10px}.nav{min-height:40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px}.tabs button{appearance:none;border:0;background:transparent;color:var(--muted);padding:12px 14px;font-size:9px;font-weight:900;letter-spacing:.18em;position:relative;cursor:pointer;text-transform:uppercase}.tabs button.on{color:#fff}.tabs button.on:after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:1px;background:#fff}.banner{font-size:11px;font-weight:800}.workspace{flex:1;padding:18px}.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.head h2{font-size:19px;margin:0;letter-spacing:-.035em}.actions{display:flex;gap:10px;flex-wrap:wrap}button{appearance:none;border:1px solid var(--border);background:var(--panel);color:#fff;padding:10px 14px;font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}button:hover{background:var(--panel2);border-color:var(--border2)}button.primary{background:#fff;color:#0a0a0a}.grid3{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border)}.bot{min-height:248px;background:var(--panel);border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:10px}.bot:hover{background:var(--panel2)}.bot-head{display:flex;justify-content:space-between;gap:12px}.bot h3{margin:0;font-size:14px;letter-spacing:-.02em}.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.pill{display:inline-flex;border:1px solid var(--border);padding:3px 7px;font-size:9px;letter-spacing:.16em}.active{box-shadow:inset 0 -1px 0 #fff;border-color:var(--border2)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 16px}.stats span{display:block;color:var(--muted);font-size:10px;letter-spacing:.16em;margin-bottom:6px}.stats strong{font-size:16px}.card-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:auto}.card-actions .strong{background:#fff;color:#0a0a0a}.layout{display:grid;grid-template-columns:1.15fr .85fr;border:1px solid var(--border)}.panel{background:var(--panel);min-height:460px;border-right:1px solid var(--border)}.panel:last-child{border-right:0}.pad{padding:14px}.table{width:100%;border-collapse:collapse}.table th{text-align:left;color:var(--muted);font-size:10px;letter-spacing:.16em;padding:10px 12px;border-bottom:1px solid var(--border)}.table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}.table tr:nth-child(even){background:#101010}.stack{display:flex;flex-direction:column;gap:3px}.stack small{color:var(--muted);font-size:11px;text-transform:none}.json{margin:0;padding:14px;background:var(--field);border:1px solid var(--border);color:var(--data);white-space:pre-wrap;max-height:370px;overflow:auto;font:11px/1.55 SFMono-Regular,Consolas,monospace;text-transform:none}.call{border:1px solid var(--border);background:var(--panel2);padding:12px 14px;color:var(--data);line-height:1.55;margin-bottom:12px;text-transform:none}.foot{min-height:40px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:11px;letter-spacing:.08em;padding:0 24px}.empty{padding:18px;color:var(--muted);font-size:10px;letter-spacing:.18em}.steps{display:grid;grid-template-columns:1fr 1fr;gap:12px}.step{border:1px solid var(--border);background:var(--panel2);padding:12px}.step h4{margin:0 0 8px;font-size:12px}.step p{margin:0;color:var(--muted);font-size:12px;line-height:1.45;text-transform:none}@media(max-width:1180px){.metric-grid{grid-template-columns:repeat(4,1fr)}.grid3,.layout{grid-template-columns:1fr}.panel{border-right:0;border-bottom:1px solid var(--border)}.top{align-items:flex-start;padding-block:12px}}@media(max-width:720px){.metric-grid{grid-template-columns:repeat(2,1fr)}.workspace{padding:12px}.top,.nav,.foot{padding-inline:12px}.brand{font-size:16px}.steps{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="root">
  <header class="top"><div class="brand">TRADENODEX</div><div class="status"><div class="chip">TRADENODEX AI</div><div class="stat"><span class="label">CONNECTIVITY</span><span class="value" id="conn">NODE-01 | --MS</span></div><div class="stat"><span class="label">REALTIME</span><span class="value" id="rt">CONNECTING</span></div><div class="stat"><span class="label">WORKER</span><span class="value">TOKEN PROTECTED</span></div><div class="stat"><span class="label">OPERATOR TOKEN</span><input id="token" class="token" type="password" placeholder="Bearer token for write APIs" /></div></div></header>
  <section class="metrics"><div class="metric-grid" id="metrics"></div></section>
  <section class="nav"><nav class="tabs" id="tabs"></nav><span class="banner" id="banner">TRADENODEX AUTOMATED TRADING SHELL CONNECTED.</span></section>
  <main class="workspace"><section class="head"><h2 id="title">ROBOTS</h2><div class="actions" id="actions"></div></section><section id="view"></section></main>
  <footer class="foot"><span>Binance, Bybit, OKX, Coinbase, Kraken, BitMEX, and Gate.io names are used only to describe exchange connectivity targets.</span><span>TradeNodeX.com</span></footer>
</div>
<script>
const VIEWS=['ROBOTS','ACCOUNTS','ORDERS','POSITIONS','VALIDATION','AUDIT LOGS','API CONTRACT'];let active='ROBOTS',state={metrics:{},bots:[],accounts:[],orders:[],positions:[],logs:[]},latency='--';
const tokenEl=()=>document.getElementById('token');function token(){return localStorage.getItem('tnx_operator_token')||''}function saveToken(){localStorage.setItem('tnx_operator_token',tokenEl().value.trim())}
function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}
async function api(path,opt={}){const t=performance.now();const headers=Object.assign({'Content-Type':'application/json'},opt.headers||{});if(token())headers.Authorization='Bearer '+token();const res=await fetch(path,Object.assign({},opt,{headers}));latency=Math.round(performance.now()-t);if(!res.ok)throw new Error(await res.text());return res.json()}
async function refresh(){saveToken();try{state=await api('/v1/dashboard',{headers:{}});rt.textContent='CONNECTED';conn.textContent=`NODE-01 | ${latency}MS`;banner.textContent='TRADENODEX AUTOMATED TRADING SHELL CONNECTED.'}catch(e){rt.textContent='API ERROR';banner.textContent=e.message;state={metrics:{bots:0,running:0,accounts:0,audit_logs:0,orders:0,positions:0},bots:[],accounts:[],orders:[],positions:[],logs:[{ts:new Date().toISOString(),level:'ERROR',message:e.message,detail:{}}]}}render()}
function metrics(){const m=state.metrics||{};const cards=[['ROBOTS',m.bots??0,'REGISTERED BOTS','◇'],['RUNNING',m.running??0,'ACTIVE ROBOTS','↯'],['ACCOUNTS',m.accounts??0,'API ACCOUNTS','◈'],['LIVE LOGS',m.audit_logs??0,'REALTIME AUDIT','▣'],['ORDERS',m.orders??0,'IDEMPOTENT EXECUTION','⇄'],['POSITIONS',m.positions??0,'RECONCILED BOOK','▤'],['LIVE GATE',state.settings?.live_trading_enabled?'ON':'OFF','TESTNET CONTROL','◎'],['FILL SUCCESS','0%','RECENT OUTCOMES','○']];document.getElementById('metrics').innerHTML=cards.map(x=>`<article class="metric"><div class="metric-top"><span>${x[0]}</span><span>${x[3]}</span></div><div><div class="metric-num">${x[1]}</div><div class="metric-note">${x[2]}</div></div></article>`).join('')}
function render(){if(tokenEl())tokenEl().value=token();metrics();tabs.innerHTML=VIEWS.map(v=>`<button class="${active===v?'on':''}" onclick="active='${v}';render()">${v}</button>`).join('');title.textContent=active;actions.innerHTML='<button onclick="refresh()">↻ REFRESH</button>';if(active==='ROBOTS')actions.innerHTML+='<button class="primary" onclick="addBot()">+ ADD BOT</button>';if(active==='ACCOUNTS')actions.innerHTML+='<button class="primary" onclick="addAccount()">+ ADD ACCOUNT</button>';if(active==='POSITIONS')actions.innerHTML+='<button class="primary" onclick="reconcile()">RUN RECONCILE</button>';if(active==='VALIDATION')actions.innerHTML+='<button class="primary" onclick="validationRun()">RUN CLOSURE</button>';({ROBOTS:robots,ACCOUNTS:accounts,ORDERS:orders,POSITIONS:positions,VALIDATION:validation,'AUDIT LOGS':logs,'API CONTRACT':contract}[active])()}
function cls(s){return s==='RUNNING'?'active':''}function robots(){view.innerHTML=`<div class="grid3">${(state.bots||[]).map(b=>`<article class="bot"><div class="bot-head"><div><h3>${esc(b.name)}</h3><div class="pills"><span class="pill">${esc(b.exchange)}</span><span class="pill">${esc(b.type)}</span><span class="pill">${b.dry_run?'DRY RUN':'TESTNET LIVE'}</span></div></div><span class="pill ${cls(b.status)}">${esc(b.status)}</span></div><div class="stats"><div><span>SYMBOLS</span><strong>${esc((b.symbols||[]).join(','))}</strong></div><div><span>QUOTE</span><strong>${esc(b.quote_currency||'USDT')}</strong></div><div><span>RISK / TICK</span><strong>${esc(b.risk_per_tick_usdt)}</strong></div><div><span>MAX POSITION</span><strong>${esc(b.max_position_usdt)}</strong></div><div><span>GRID LEVELS</span><strong>${esc(b.grid_levels||'-')}</strong></div><div><span>ACCOUNT</span><strong>${esc((b.account_id||'NONE').slice(0,10))}</strong></div></div><div class="card-actions"><button onclick="setStatus('${b.id}','RUNNING')">START</button><button onclick="setStatus('${b.id}','PAUSED')">PAUSE</button><button class="primary" onclick="tick('${b.id}')">TICK</button></div></article>`).join('')||'<div class="empty">NO ROBOTS REGISTERED.</div>'}</div>`}
function accounts(){view.innerHTML=`<div class="layout"><div class="panel"><table class="table"><tr><th>Name</th><th>Exchange</th><th>Env</th><th>Mode</th><th>Credential</th></tr>${(state.accounts||[]).map(a=>`<tr><td><div class="stack"><b>${esc(a.name)}</b><small>${esc(a.id)}</small></div></td><td>${esc(a.exchange)}</td><td>${esc(a.environment)}</td><td>${a.dry_run?'DRY RUN':'TESTNET LIVE'}</td><td>${esc(a.api_key_masked||'NOT SET')} / ${a.has_secret?'SECRET STORED':'NO SECRET'}</td></tr>`).join('')}</table></div><div class="panel pad"><h3>SECURITY POSTURE</h3><div class="call">Write APIs require Authorization Bearer token. API keys are encrypted server-side and never displayed here.</div></div></div>`}
function orders(){view.innerHTML=`<table class="table"><tr><th>Time</th><th>Bot</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Status</th><th>Idempotency</th></tr>${(state.orders||[]).map(o=>`<tr><td>${esc(o.created_at||o.ts)}</td><td>${esc(String(o.bot_id||'').slice(0,12))}</td><td>${esc(o.symbol)}</td><td>${esc(o.side)}</td><td>${esc(o.qty)}</td><td><span class="pill">${esc(o.status)}</span></td><td><div class="stack"><b>${esc(String(o.idempotency_key||'').slice(0,28))}</b></div></td></tr>`).join('')||'<tr><td colspan="7"><div class="empty">NO ORDERS.</div></td></tr>'}</table>`}
function positions(){view.innerHTML=`<table class="table"><tr><th>Exchange</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Mark</th><th>UPnL</th></tr>${(state.positions||[]).map(p=>`<tr><td>${esc(p.exchange)}</td><td>${esc(p.symbol)}</td><td>${esc(p.side)}</td><td>${esc(p.qty)}</td><td>${esc(p.entry_price)}</td><td>${esc(p.mark_price)}</td><td>${esc(p.unrealized_pnl)}</td></tr>`).join('')||'<tr><td colspan="7"><div class="empty">NO POSITIONS.</div></td></tr>'}</table>`}
function validation(){view.innerHTML=`<div class="layout"><div class="panel pad"><div class="call">Runs health → market snapshot → account → bot → tick → reconcile. Operator token is required.</div><div class="steps"><div class="step"><h4>1 HEALTH</h4><p>Readiness and live gate.</p></div><div class="step"><h4>2 SNAPSHOT</h4><p>Market and funding.</p></div><div class="step"><h4>3 ACCOUNT</h4><p>Encrypted credential metadata.</p></div><div class="step"><h4>4 BOT</h4><p>DCA/Funding/Grid.</p></div><div class="step"><h4>5 TICK</h4><p>Strategy + risk + execution.</p></div><div class="step"><h4>6 RECONCILE</h4><p>Positions, orders, balances.</p></div></div></div><div class="panel pad"><h3>VALIDATION OUTPUT</h3><pre class="json" id="out">CLICK RUN CLOSURE.</pre></div></div>`}
function logs(){view.innerHTML=`<table class="table"><tr><th>Time</th><th>Level</th><th>Bot</th><th>Message</th><th>Detail</th></tr>${(state.logs||[]).map(l=>`<tr><td>${esc(l.ts)}</td><td>${esc(l.level)}</td><td>${esc(String(l.bot_id||'').slice(0,12))}</td><td>${esc(l.message)}</td><td><pre class="json">${esc(JSON.stringify(l.detail||{},null,2))}</pre></td></tr>`).join('')}</table>`}
function contract(){view.innerHTML=`<pre class="json">${esc(JSON.stringify({'GET /v1/health':'public','GET /v1/dashboard':'public','POST /v1/accounts':'operator token','POST /v1/bots':'operator token','POST /v1/bots/{id}/tick':'operator token','POST /v1/reconcile':'operator token','POST /v1/market-snapshot':'operator token'},null,2))}</pre>`}
async function setStatus(id,s){try{await api(`/v1/bots/${id}/${s.toLowerCase()}`,{method:'POST'});await refresh()}catch(e){alert(e.message)}}async function tick(id){try{alert(JSON.stringify(await api(`/v1/bots/${id}/tick`,{method:'POST'}),null,2));await refresh()}catch(e){alert(e.message)}}async function reconcile(){try{alert(JSON.stringify(await api('/v1/reconcile',{method:'POST'}),null,2));await refresh()}catch(e){alert(e.message)}}async function addBot(){const name=prompt('BOT NAME','Binance Testnet Validation DCA');if(!name)return;await api('/v1/bots',{method:'POST',body:JSON.stringify({name,type:'DCA',exchange:'BINANCE_FUTURES',symbols:['BTCUSDT'],dry_run:true,max_position_usdt:20,risk_per_tick_usdt:5})});await refresh()}async function addAccount(){const name=prompt('ACCOUNT NAME','Binance Futures Testnet Validation');if(!name)return;await api('/v1/accounts',{method:'POST',body:JSON.stringify({name,exchange:'BINANCE_FUTURES',environment:'TESTNET',base_currency:'USDT',dry_run:true})});await refresh()}async function validationRun(){const out=[];const p=x=>{out.push(typeof x==='string'?x:JSON.stringify(x,null,2));document.getElementById('out').textContent=out.join('\n\n')};try{p('1 GET /v1/health');p(await api('/v1/health'));p('2 POST /v1/market-snapshot');p(await api('/v1/market-snapshot',{method:'POST',body:JSON.stringify({exchange:'BINANCE_FUTURES',symbol:'BTCUSDT'})}));p('3 POST /v1/accounts');const a=await api('/v1/accounts',{method:'POST',body:JSON.stringify({name:'Validation Preview Account',exchange:'BINANCE_FUTURES',environment:'TESTNET',dry_run:true})});p(a);p('4 POST /v1/bots');const b=await api('/v1/bots',{method:'POST',body:JSON.stringify({name:'Validation Preview DCA',type:'DCA',exchange:'BINANCE_FUTURES',symbols:['BTCUSDT'],dry_run:true,max_position_usdt:20,risk_per_tick_usdt:5,account_id:a.id})});p(b);p('5 POST /v1/bots/{id}/tick');p(await api(`/v1/bots/${b.id}/tick`,{method:'POST'}));p('6 POST /v1/reconcile');p(await api('/v1/reconcile',{method:'POST'}));p('RESULT: PASSED')}catch(e){p('FAILED: '+e.message)}await refresh()}
window.addEventListener('load',()=>{tokenEl().value=token();tokenEl().addEventListener('change',saveToken);refresh()});
</script>
</body>
</html>
